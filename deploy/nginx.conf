# /etc/nginx/sites-available/academic-chatbot
# ALAN_ADIN yerine kendi domain'ini yaz, sonra:
#   sudo certbot --nginx -d ALAN_ADIN
# certbot bu dosyayi otomatik duzenleyip 443/SSL bloklarini ve 80->443
# yonlendirmesini ekleyecek — o adimdan once elle SSL ekleme.

server {
    listen 80;
    server_name ALAN_ADIN;

    client_max_body_size 50M;  # app.py'deki MAX_CONTENT_LENGTH ile ayni (belge yukleme)

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # /api/chat/stream Server-Sent Events kullanir — nginx'in varsayilan
    # buffering'i acikken SSE olaylari LLM cevabi tamamlanana kadar tarayiciya
    # ulasmaz (adim gostergesi canli akmaz, hepsi sonda tek seferde gelir).
    location /api/chat/stream {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;
    }
}
